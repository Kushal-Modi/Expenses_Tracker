apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: kushalmodi220105/expense-backend:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
