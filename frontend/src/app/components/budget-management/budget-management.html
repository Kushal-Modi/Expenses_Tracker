<div class="budget-wrapper">
  <div class="header">
    <a routerLink="/dashboard" class="btn-back">← Back to Dashboard</a>
    <h2>Budget Management 🎯</h2>
    <p>Set monthly spending limits for your categories.</p>
  </div>

  <div class="budget-content">
    <div class="glass-panel add-card">
      <h3>Set Budget</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select [(ngModel)]="newBudget.category" class="form-control">
            <option value="" disabled selected>Select Category</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Limit (₹)</label>
          <input type="number" [(ngModel)]="newBudget.amount" class="form-control" placeholder="0.00">
        </div>
        <button class="btn btn-primary" (click)="saveBudget()">Save Budget</button>
      </div>
    </div>

    <div class="glass-panel list-card">
      <h3>Active Budgets</h3>
      <div class="budget-list" *ngIf="budgets.length > 0; else empty">
        <div class="budget-row" *ngFor="let budget of budgets">
          <div class="info">
            <span class="cat">{{ budget.category }}</span>
            <span class="amt">₹{{ budget.amount | number:'1.0-0' }}</span>
          </div>
          <button class="btn-delete" (click)="deleteBudget(budget.id)">×</button>
        </div>
      </div>
      <ng-template #empty>
        <p class="empty-msg">No budgets set yet.</p>
      </ng-template>
    </div>
  </div>
</div>
