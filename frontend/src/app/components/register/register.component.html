<div class="auth-container">
  <div class="glass-panel auth-card">
    <h2>Create Account 🚀</h2>
    <p>Sign up to start tracking expenses.</p>
    
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" class="form-control" placeholder="Enter your name" />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" class="form-control" placeholder="Choose a username" />
      </div>
      <div class="form-group">
        <label>Email ID</label>
        <input type="email" formControlName="email" class="form-control" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Choose a password (min 6 chars)" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="registerForm.invalid">Sign Up</button>
    </form>
    
    <p class="auth-footer">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
