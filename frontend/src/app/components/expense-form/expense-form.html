<div class="form-wrapper">
  <div class="form-header">
    <a routerLink="/expenses" class="btn-back">← Back</a>
    <h2>{{ isEditMode ? 'Edit' : 'Add New' }} Transaction</h2>
  </div>

  <div class="type-toggle-container glass-panel mb-4">
    <div class="transaction-type-toggle">
      <button type="button" 
              [class.active]="!expense.isIncome" 
              (click)="expense.isIncome = false" 
              class="toggle-btn expense">Expense</button>
      <button type="button" 
              [class.active]="expense.isIncome" 
              (click)="expense.isIncome = true" 
              class="toggle-btn income">Income</button>
    </div>
  </div>

  <div class="glass-panel form-card">
    <form (ngSubmit)="onSubmit()" #expenseForm="ngForm">
      
      <div class="form-row">
        <div class="form-group flex-2">
          <label for="title">What was this for?</label>
          <input 
            type="text" 
            id="title" 
            name="title" 
            class="form-control" 
            [(ngModel)]="expense.title" 
            required 
            placeholder="e.g., Weekly Groceries" />
        </div>

        <div class="form-group flex-1">
          <label for="amount">Amount (₹)</label>
          <input 
            type="number" 
            id="amount" 
            name="amount" 
            class="form-control amount-input" 
            [(ngModel)]="expense.amount" 
            required 
            min="0.01" 
            step="0.01" 
            placeholder="0.00" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label for="category">Category</label>
          <select 
            id="category" 
            name="category" 
            class="form-control" 
            [(ngModel)]="expense.category" 
            required>
            <option value="" disabled selected>Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <div class="form-group flex-1">
          <label for="date">Date</label>
          <input 
            type="date" 
            id="date" 
            name="date" 
            class="form-control" 
            [(ngModel)]="expense.date" 
            required />
        </div>
      </div>

      <div class="form-actions">
        <a routerLink="/expenses" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary" [disabled]="!expenseForm.form.valid">
          {{ isEditMode ? 'Update' : 'Save' }} Expense
        </button>
      </div>

    </form>
  </div>
</div>
