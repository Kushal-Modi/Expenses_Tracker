<div class="app-wrapper">
  <nav class="navbar glass-panel">
    <div class="nav-brand">
      <div class="logo-icon">✨</div>
      <h1>Nexus Expenses</h1>
    </div>
    <div class="nav-links">
      <ng-container *ngIf="authService.authStatus$ | async; else unauthLinks">
        <button (click)="themeService.toggleTheme()" class="btn-icon theme-toggle" title="Toggle Theme">
          {{ (themeService.theme$ | async) === 'dark' ? '☀️' : '🌙' }}
        </button>
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
        <a routerLink="/expenses" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Expenses</a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">Profile</a>
        <a routerLink="/expenses/add" routerLinkActive="active" class="btn btn-primary">Add Expense</a>
        <button (click)="logout()" class="nav-link" style="background:none;border:none;cursor:pointer">Logout</button>
      </ng-container>
      <ng-template #unauthLinks>
        <a routerLink="/login" class="nav-link">Login</a>
        <a routerLink="/register" class="btn btn-primary">Sign Up</a>
      </ng-template>
    </div>
  </nav>

  <main class="container">
    <router-outlet></router-outlet>
  </main>
</div>
